<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Elephantaes · Square Shop Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --cream-50: #fbf6e2;
    --cream-100: #f8f0d2;
    --cream-200: #f5ebc8;
    --cream-300: #ecdfae;
    --forest-700: #2e4a2a;
    --forest-800: #1f3219;
    --forest-900: #142010;
    --honey: #c9985c;
    --honey-soft: #e0b97b;
    --ink: #1a2415;
    --ink-soft: #4a5546;
    --display: 'Fraunces', 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 2400px; height: 800px; overflow: hidden; }
  body { font-family: var(--sans); }

  .banner {
    position: relative;
    width: 2400px;
    height: 800px;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    background: var(--cream-100);
    overflow: hidden;
  }

  /* === Left half: photo === */
  .photo {
    position: relative;
    overflow: hidden;
  }
  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
  }
  /* Subtle dark gradient to anchor the photo and add depth */
  .photo::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(31, 50, 25, 0.18), transparent 35%),
      linear-gradient(to top, rgba(31, 50, 25, 0.35), transparent 40%);
    pointer-events: none;
  }
  /* Photo eyebrow overlaid on bottom-left of photo */
  .photo-cap {
    position: absolute;
    bottom: 56px;
    left: 56px;
    color: var(--cream-100);
    font-family: var(--sans);
    font-size: 18px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    opacity: 0.85;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .photo-cap::before {
    content: "";
    width: 48px;
    height: 1px;
    background: var(--honey);
    opacity: 0.85;
  }

  /* === Right half: brand panel === */
  .panel {
    position: relative;
    display: grid;
    place-items: center;
    padding: 80px 120px;
    background:
      radial-gradient(800px 500px at 90% -10%, rgba(201, 152, 92, 0.20), transparent 60%),
      radial-gradient(600px 400px at -10% 110%, rgba(46, 74, 42, 0.12), transparent 60%),
      var(--cream-100);
  }

  /* Paper-grain overlay */
  .panel::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.45;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.18 0 0 0 0 0.29 0 0 0 0 0.16 0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .panel-inner {
    position: relative;
    text-align: center;
    width: 100%;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 22px;
    color: var(--forest-700);
    opacity: 0.75;
    font-size: 16px;
    letter-spacing: 0.48em;
    text-transform: uppercase;
    margin-bottom: 48px;
    white-space: nowrap;
  }
  .eyebrow::before, .eyebrow::after {
    content: "";
    width: 44px;
    height: 1px;
    background: var(--forest-700);
    opacity: 0.55;
  }

  .mark {
    width: 620px;
    height: auto;
    margin: 0 auto 36px;
    display: block;
  }

  .tagline {
    font-family: var(--display);
    font-size: 38px;
    font-style: italic;
    font-weight: 300;
    color: var(--forest-800);
    line-height: 1.25;
    margin-bottom: 36px;
    font-variation-settings: 'opsz' 144;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  .tagline em {
    font-style: normal;
    color: var(--honey);
    font-weight: 400;
  }

  .meta {
    font-family: var(--sans);
    font-size: 15px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--forest-700);
    opacity: 0.7;
    line-height: 2.4;
  }
  .meta .dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--honey);
    margin: 0 16px;
    vertical-align: middle;
  }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 64px;
    height: 64px;
    color: var(--forest-700);
    opacity: 0.4;
  }
  .corner.tl { top: 40px; left: 40px; }
  .corner.tr { top: 40px; right: 40px; transform: scaleX(-1); }
  .corner.bl { bottom: 40px; left: 40px; transform: scaleY(-1); }
  .corner.br { bottom: 40px; right: 40px; transform: scale(-1, -1); }

</style>
</head>
<body>

<div class="banner">

  <!-- Left: hero photo -->
  <div class="photo">
    <img src="../site/public/gallery/tiramisu-layers.jpg" alt="Hand-built tiramisu layers" />
    <div class="photo-cap">Hand-built · Spring 2026</div>
  </div>

  <!-- Right: brand panel -->
  <div class="panel">

    <!-- Corner ornaments -->
    <svg class="corner tl" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
      <path d="M2 2 L 26 2 M2 2 L 2 26 M2 2 Q 18 4, 26 22" />
      <circle cx="2" cy="2" r="1.8" fill="currentColor" stroke="none" />
    </svg>
    <svg class="corner tr" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
      <path d="M2 2 L 26 2 M2 2 L 2 26 M2 2 Q 18 4, 26 22" />
      <circle cx="2" cy="2" r="1.8" fill="currentColor" stroke="none" />
    </svg>
    <svg class="corner bl" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
      <path d="M2 2 L 26 2 M2 2 L 2 26 M2 2 Q 18 4, 26 22" />
      <circle cx="2" cy="2" r="1.8" fill="currentColor" stroke="none" />
    </svg>
    <svg class="corner br" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
      <path d="M2 2 L 26 2 M2 2 L 2 26 M2 2 Q 18 4, 26 22" />
      <circle cx="2" cy="2" r="1.8" fill="currentColor" stroke="none" />
    </svg>

    <div class="panel-inner">
      <div class="eyebrow">Philadelphia · Made by hand</div>

      <img class="mark" src="../site/public/logo-mark.png" alt="Elephantaes Cakes &amp; Delicacies" />

      <div class="tagline">
        Tiramisu, custom cakes,<br/>
        <em>and the good part of the day.</em>
      </div>

      <div class="meta">
        Pickup &nbsp;·&nbsp; Sat 9–12 &nbsp;<span class="dot"></span>&nbsp; Sun 2–5
      </div>
    </div>

  </div>

</div>

</body>
</html>
