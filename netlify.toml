# Netlify config for the Elephantaes landing page + admin studio.
#
# Git-based deploys: push to GitHub, Netlify builds automatically.
# The build does two things:
#   1. Builds the Next.js site (static export to site/out)
#   2. Builds the Sanity Studio and copies it to site/out/admin,
#      so the editor lives at elephantaes.com/admin

[build]
  base = "site"
  command = "npm run build && cd ../studio && npm install && npm run build && cp -r dist ../site/out/admin && cp -r dist/static ../site/out/static"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  # Sanity project (not secret — it's visible in client requests anyway)
  SANITY_STUDIO_PROJECT_ID = "yxd68kno"
  SANITY_STUDIO_DATASET = "production"

# submission-created.mjs copies form submissions into Sanity so they appear
# in the admin panel. Needs SANITY_WRITE_TOKEN set in the Netlify UI (secret).
[functions]
  directory = "netlify/functions"

# The studio is a single-page app: deep links under /admin need to fall
# back to its index.html. Real files (JS/CSS assets) still serve normally
# because this redirect isn't forced.
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/gallery/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
